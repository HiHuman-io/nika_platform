# nginx vhost for app.musichub.hihuman.io -> 127.0.0.1:3400 (nika-catalog container)
# Enable via SYMLINK into sites-enabled (never a copy) so `git pull` keeps it current:
#   sudo ln -s /opt/nika-catalog/deploy/nginx/app.musichub.hihuman.io.conf \
#             /etc/nginx/sites-enabled/app.musichub.hihuman.io.conf

server {
    listen 80;
    listen [::]:80;
    server_name app.musichub.hihuman.io;

    # Let ACME renewals through over HTTP; redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.musichub.hihuman.io;

    ssl_certificate     /etc/letsencrypt/live/app.musichub.hihuman.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.musichub.hihuman.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Uploads go straight to storage from the browser; keep a sane request cap.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 300s;
    }
}
